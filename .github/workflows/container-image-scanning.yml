name: Container Image Scanning with Trivy

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'src/voice-gateway/**'
      - 'src/docker-compose.yml'
      - '.github/workflows/container-image-scanning.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
      - 'src/voice-gateway/**'
      - 'src/docker-compose.yml'
      - '.github/workflows/container-image-scanning.yml'
  schedule:
    # Run daily at 02:00 UTC to catch new vulnerabilities
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan-backend:
    name: Scan Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          tags: bizos-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bizos-backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          scanners: 'vuln,secret,config'

      - name: Upload Trivy results to GitHub Security tab (Backend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'trivy-backend'

      - name: Generate vulnerability report (Backend)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bizos-backend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-backend-report.txt'
          scanners: 'vuln,secret,config'

      - name: Upload vulnerability report artifact (Backend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-report
          path: trivy-backend-report.txt
          retention-days: 30

  scan-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          tags: bizos-frontend:${{ github.sha }}
          load: true
          build-args: |
            VITE_DEBUG_MODE=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bizos-frontend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          scanners: 'vuln,secret,config'

      - name: Upload Trivy results to GitHub Security tab (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'trivy-frontend'

      - name: Generate vulnerability report (Frontend)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bizos-frontend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-frontend-report.txt'
          scanners: 'vuln,secret,config'

      - name: Upload vulnerability report artifact (Frontend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-report
          path: trivy-frontend-report.txt
          retention-days: 30

  scan-voice-gateway:
    name: Scan Voice Gateway Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build voice-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./src/voice-gateway
          file: ./src/voice-gateway/Dockerfile
          tags: bizos-voice-gateway:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Voice Gateway)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bizos-voice-gateway:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-voice-gateway-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          scanners: 'vuln,secret,config'

      - name: Upload Trivy results to GitHub Security tab (Voice Gateway)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-voice-gateway-results.sarif'
          category: 'trivy-voice-gateway'

      - name: Generate vulnerability report (Voice Gateway)
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bizos-voice-gateway:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-voice-gateway-report.txt'
          scanners: 'vuln,secret,config'

      - name: Upload vulnerability report artifact (Voice Gateway)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-voice-gateway-report
          path: trivy-voice-gateway-report.txt
          retention-days: 30

  scan-base-images:
    name: Scan Base Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: postgres:16-alpine
            name: postgres
          - image: redis:7-alpine
            name: redis
          - image: node:20-alpine
            name: node
          - image: nginx:alpine
            name: nginx
          - image: prom/prometheus:v2.51.0
            name: prometheus
          - image: prom/alertmanager:v0.27.0
            name: alertmanager
    steps:
      - name: Run Trivy vulnerability scanner (${{ matrix.name }})
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-${{ matrix.name }}-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          scanners: 'vuln'

      - name: Upload Trivy results to GitHub Security tab (${{ matrix.name }})
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.name }}-results.sarif'
          category: 'trivy-base-${{ matrix.name }}'

      - name: Generate vulnerability report (${{ matrix.name }})
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-${{ matrix.name }}-report.txt'
          scanners: 'vuln'

      - name: Upload vulnerability report artifact (${{ matrix.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-base-${{ matrix.name }}-report
          path: 'trivy-${{ matrix.name }}-report.txt'
          retention-days: 30

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [scan-backend, scan-frontend, scan-voice-gateway, scan-base-images]
    if: always()
    steps:
      - name: Report scan status
        run: |
          echo "## Container Image Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ All container images have been scanned with Trivy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scanned Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- Backend (node:20-alpine)" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend (nginx:alpine)" >> $GITHUB_STEP_SUMMARY
          echo "- Voice Gateway (node:20-alpine)" >> $GITHUB_STEP_SUMMARY
          echo "- Base Images: PostgreSQL, Redis, Node, Nginx, Prometheus, Alertmanager" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Threshold:** HIGH, CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "**Policy:** Build fails if HIGH or CRITICAL vulnerabilities are found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed reports in the Security tab and workflow artifacts." >> $GITHUB_STEP_SUMMARY
